[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
]

[tool.coverage.run]
source = ["app", "agents", "rag", "analysis", "mcp_server", "delivery", "db", "cache"]
omit = ["*/tests/*", "*/__pycache__/*"]
